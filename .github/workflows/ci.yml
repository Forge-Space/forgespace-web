name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm test

  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - name: Dead code detection
        run: npx knip
      - name: Circular dependency check
        run: npm run check:cycles

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, quality]
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: Forge-Space/.github/.github/actions/setup-node@main
      - run: npm audit --audit-level=high || true
