name: Production Smoke Checks

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy to Vercel"]
    types: [completed]

jobs:
  smoke:
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "playwright==1.54.0"
          python -m playwright install --with-deps chromium

      - name: Run production smoke checks
        run: python scripts/smoke/production_smoke.py --output-dir artifacts/smoke

      - name: Publish smoke summary
        if: always()
        run: |
          if [ -f artifacts/smoke/report.md ]; then
            cat artifacts/smoke/report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No smoke report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: production-smoke-artifacts-${{ github.run_id }}
          path: artifacts/smoke
          if-no-files-found: ignore
