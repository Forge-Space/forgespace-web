# forgespace-web — Docker dev (matches mcp-gateway, siza patterns)
# Run: docker compose up (or ./scripts/dev.sh up)
# Prod: docker compose -f docker-compose.prod.yml up -d

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: forgespace-web:latest
    container_name: forgespace-web
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=1536
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    tty: true
    stdin_open: true
    command: npm run dev
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    memswap_limit: 2G
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    shm_size: 256mb
    init: true

volumes:
  node_modules:
